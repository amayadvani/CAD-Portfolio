<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amay Advani | CAD Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Three.js + OrbitControls + STLLoader via CDN (UMD) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>

<style>
/* ===== CSS Variables ===== */
:root {
    --bg-dark: #1c1620;
    --bg-card: #2a2133;
    --bg-card-hover: #352940;
    --accent-gold: #f4b942;
    --accent-gold-soft: #e8a42f;
    --accent-rose: #ff6b5c;
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.65);
    --text-muted: rgba(255, 255, 255, 0.45);
    --border-subtle: rgba(255, 255, 255, 0.08);
    --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.35);
    --shadow-glow: 0 0 60px rgba(244, 185, 66, 0.12);
    --border-radius-lg: 24px;
    --border-radius-md: 16px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
}

/* ===== Reset & Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font-body);
    background: radial-gradient(1200px 800px at 10% 10%, #2a1f30 0%, transparent 70%), radial-gradient(1000px 700px at 90% 10%, #231828 0%, transparent 60%), var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 24px;
    line-height: 1.6;
}

/* Decorative background elements */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f4b942' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    z-index: -1;
}

/* ===== Header ===== */
header {
    text-align: center;
    margin-bottom: 56px;
    position: relative;
}

header::before {
    content: '';
    display: block;
    width: 200px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
    margin: 0 auto 32px;
    border-radius: 2px;
}

header h1 {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 600;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-gold) 65%, #ffcd5c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    margin-bottom: 12px;
}

header p {
    font-size: 1.05rem;
    color: var(--text-secondary);
    font-weight: 300;
    letter-spacing: 0.5px;
    max-width: 400px;
    margin: 0 auto;
}

.header-sub {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 3px;
}

/* ===== Grid ===== */
#grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 32px;
    max-width: 1280px;
    margin: 0 auto;
}

/* ===== CAD Card ===== */
.cad-card {
    background: linear-gradient(145deg, var(--bg-card) 0%, #221a28 100%);
    border: 1px solid var(--border-subtle);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
    position: relative;
}

.cad-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(244, 185, 66, 0.3), transparent, rgba(244, 185, 66, 0.1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

.cad-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: var(--shadow-soft), var(--shadow-glow);
    border-color: rgba(244, 185, 66, 0.35);
}

/* ===== Viewer Wrapper ===== */
.viewer-wrapper {
    width: 100%;
    height: 340px;
    background: transparent;
    position: relative;
    overflow: hidden;
}

.viewer-wrapper iframe,
.viewer-wrapper .cad-viewer,
.viewer-wrapper canvas {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

.drag-hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.45);
    color: var(--accent-gold);
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 20px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.5s ease;
    font-weight: 500;
    letter-spacing: 0.3px;
    backdrop-filter: blur(8px);
}

.drag-hint::before {
    content: '\21BB';
    font-size: 1rem;
    animation: spin 4s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ===== Card Info ===== */
.card-info {
    padding: 24px 28px;
    background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.25) 100%);
    border-top: 1px solid var(--border-subtle);
}

.card-info h3 {
    color: var(--text-primary);
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
}

.card-info p {
    color: var(--text-secondary);
    font-size: 0.87rem;
    line-height: 1.6;
    font-weight: 300;
}

/* ===== Responsive ===== */
@media (max-width: 440px) {
    body { padding: 24px 16px; }
    #grid-container { gap: 20px; }
    .viewer-wrapper { height: 260px; }
    header { margin-bottom: 36px; }
    .card-info { padding: 18px 20px; }
}
</style>
</head>
<body> 
<header>
    <h1>Amay Advani</h1>
    <p>CAD Portfolio — Mechanical Engineering Student</p>
    <div class="header-sub">Virginia Polytechnic Institute</div>
</header>
<div id="grid-container"></div>

<script src="cad_data.js"></script>
<script src="cad_viewer.js"></script>
<script src="main.js"></script>
</body>
</html>
