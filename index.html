<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amay Advani's CAD Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #E0F6FF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #87CEEB;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.1rem;
            color: #5a9fc0;
            font-weight: 300;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .cad-card {
            background: linear-gradient(145deg, #111111, #1a1a2e);
            border: 1px solid #1e3a5f;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cad-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(135, 206, 235, 0.15);
            border-color: #87CEEB;
        }

        .viewer-wrapper {
            width: 100%;
            height: 380px;
            background: #000;
            position: relative;
        }

        .viewer-wrapper iframe,     .viewer-wrapper .cad-viewer,     .viewer-wrapper canvas {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .drag-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #87CEEB;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease;
        }

        .card-info {
            padding: 20px 24px;
        }

        .card-info h3 {
            color: #87CEEB;
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .card-info p {
            color: #5a9fc0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        @media (max-width: 500px) {
            #grid-container { grid-template-columns: 1fr; }
            header h1 { font-size: 1.8rem; }
            .viewer-wrapper { height: 280px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Amay Advani</h1>
        <p>CAD Portfolio &mdash; click &amp; drag any model to rotate</p>
    </header>

    <div id="grid-container"></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>

    <script src="cad_data.js"></script>
    <script src="main.js"></script>
</body>
</html>
